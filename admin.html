<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | シフト管理</title>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #0b0f19;
      --card-bg: rgba(255, 255, 255, 0.03);
      --card-border: rgba(255, 255, 255, 0.08);
      --primary: #00d2ff;
      --secondary: #3a7bd5;
      --accent: #00f2fe;
      --text-main: #f8f9fa;
      --text-muted: #a0aabf;
      --danger: #ff4757;
      --success: #2ed573;
      --warning: #ffa502;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Outfit', 'Noto Sans JP', sans-serif;
      background: var(--bg-color);
      background-image: 
        radial-gradient(circle at 15% 50%, rgba(58, 123, 213, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 85% 30%, rgba(0, 210, 255, 0.15) 0%, transparent 50%);
      color: var(--text-main);
      min-height: 100vh;
      overflow-x: hidden;
    }

    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }

    .glass-panel {
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
    }

    /* Auth Layer */
    .auth-layer {
      position: fixed; inset: 0; z-index: 1000;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: var(--bg-color);
    }
    .loader-ring {
      width: 60px; height: 60px; border-radius: 50%;
      border: 4px solid rgba(255,255,255,0.1);
      border-top-color: var(--primary);
      animation: spin 1s linear infinite; margin-bottom: 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Layout */
    .app-container {
      display: flex; height: 100vh;
      opacity: 0; transition: opacity 0.6s ease;
    }
    
    .sidebar {
      width: 260px; padding: 30px 20px;
      display: flex; flex-direction: column; gap: 20px;
      border-right: 1px solid var(--card-border);
      background: rgba(11, 15, 25, 0.8);
      backdrop-filter: blur(20px);
      z-index: 10;
    }
    @media (max-width: 768px) {
      .app-container { flex-direction: column; }
      .sidebar { width: 100%; height: auto; padding: 20px; border-right: none; border-bottom: 1px solid var(--card-border); flex-direction: row; justify-content: space-between; align-items: center; }
      .sidebar .nav-links { display: flex; gap: 10px; }
      .sidebar .user-profile { display: none; }
    }

    .brand {
      display: flex; align-items: center; gap: 12px; font-weight: 700; font-size: 22px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    }
    .brand-icon {
      width: 36px; height: 36px; border-radius: 10px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      display: flex; align-items: center; justify-content: center; color: white;
      font-size: 18px; -webkit-text-fill-color: white;
    }

    .nav-btn {
      padding: 12px 16px; border-radius: 12px;
      background: transparent; color: var(--text-muted);
      border: 1px solid transparent; text-align: left;
      font-family: inherit; font-size: 15px; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; gap: 12px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .nav-btn:hover { background: rgba(255,255,255,0.05); color: var(--text-main); }
    .nav-btn.active {
      background: linear-gradient(90deg, rgba(58, 123, 213, 0.2), transparent);
      border-left: 3px solid var(--primary);
      color: var(--primary);
    }

    .user-profile {
      margin-top: auto; padding-top: 20px; border-top: 1px solid var(--card-border);
      display: flex; align-items: center; gap: 12px; font-size: 14px;
    }
    .user-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; background: #2c3e50; }

    .main-content {
      flex: 1; overflow-y: auto; padding: 40px; position: relative;
    }
    @media (max-width: 768px) { .main-content { padding: 20px; } }

    /* Sections */
    .section-header { margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
    .section-title { font-size: 28px; font-weight: 700; }
    .section-desc { color: var(--text-muted); font-size: 15px; margin-top: 4px; }

    /* Cards & Controls */
    .control-bar { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; align-items: center; }
    
    .select-styled {
      background: rgba(0,0,0,0.3); border: 1px solid var(--card-border);
      color: var(--text-main); padding: 10px 16px; border-radius: 10px;
      font-family: inherit; font-size: 15px; outline: none; cursor: pointer; transition: 0.2s;
    }
    .select-styled:focus { border-color: var(--primary); }

    .input-styled {
      background: rgba(0,0,0,0.3); border: 1px solid var(--card-border);
      color: var(--text-main); padding: 10px 16px; border-radius: 10px;
      font-family: inherit; font-size: 15px; outline: none; transition: 0.2s; width: 100%;
    }
    .input-styled:focus { border-color: var(--primary); }

    .btn {
      padding: 10px 20px; border-radius: 10px; font-family: inherit; font-size: 15px; font-weight: 600;
      border: none; cursor: pointer; transition: all 0.2s;
      display: inline-flex; align-items: center; gap: 8px; justify-content: center;
    }
    .btn-primary { background: linear-gradient(135deg, var(--secondary), var(--primary)); color: white; box-shadow: 0 4px 15px rgba(0, 210, 255, 0.3); }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0, 210, 255, 0.4); }
    .btn-primary:active { transform: translateY(0); }
    
    .btn-success { background: linear-gradient(135deg, #20bf55, #01baef); color: white; box-shadow: 0 4px 15px rgba(32, 191, 85, 0.3); }
    .btn-success:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(32, 191, 85, 0.4); }

    /* AI Summary Area */
    .ai-summary { background: rgba(0, 210, 255, 0.05); border: 1px solid rgba(0, 210, 255, 0.2); padding: 24px; border-radius: 12px; margin-bottom: 24px; }
    .ai-summary-title { font-size: 16px; font-weight: 600; color: var(--primary); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    
    .shortage-item { background: rgba(255, 71, 87, 0.1); border-left: 3px solid var(--danger); padding: 8px 12px; margin-bottom: 8px; font-size: 14px; border-radius: 4px; display: flex; align-items: center; gap: 10px; }
    .shortage-ok { background: rgba(46, 213, 115, 0.1); border-left: 3px solid var(--success); padding: 8px 12px; font-size: 14px; border-radius: 4px; color: var(--success); }

    /* Table Styles */
    .table-container { width: 100%; overflow-x: auto; border-radius: 16px; border: 1px solid var(--card-border); background: var(--card-bg); }
    table { width: 100%; border-collapse: collapse; text-align: left; }
    th, td { padding: 16px 20px; border-bottom: 1px solid var(--card-border); white-space: nowrap; }
    th { background: rgba(0,0,0,0.2); color: var(--text-muted); font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    tbody tr { transition: background 0.2s; }
    tbody tr:hover { background: rgba(255,255,255,0.03); }
    
    .badge { padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: 600; }
    .badge-pending { background: rgba(255, 165, 2, 0.15); color: var(--warning); border: 1px solid rgba(255, 165, 2, 0.3); }
    .badge-approved { background: rgba(46, 213, 115, 0.15); color: var(--success); border: 1px solid rgba(46, 213, 115, 0.3); }

    /* Toggle Switch */
    .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(255,255,255,0.1); transition: .3s; border-radius: 24px; border: 1px solid var(--card-border); }
    .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: var(--text-muted); transition: .3s; border-radius: 50%; }
    input:checked + .slider { background-color: rgba(46, 213, 115, 0.3); border-color: var(--success); }
    input:checked + .slider:before { transform: translateX(20px); background-color: var(--success); }

    /* Roster Form Layout */
    .roster-layout { display: flex; gap: 24px; align-items: flex-start; }
    .roster-layout-filter { flex: 0 0 160px; display: flex; flex-direction: column; gap: 8px; }
    .roster-layout-left { flex: 0 0 250px; display: flex; flex-direction: column; gap: 8px; max-height: calc(100vh - 200px); overflow-y: auto; padding-right: 8px; }
    .roster-layout-right { flex: 1; }

    @media (max-width: 768px) {
      .roster-layout { flex-direction: column; }
      .roster-layout-filter { flex: none; width: 100%; flex-direction: row; flex-wrap: wrap; }
      .roster-layout-left { flex: none; width: 100%; max-height: 250px; }
    }

    .store-filter-btn { padding: 10px 16px; border-radius: 8px; background: rgba(255,255,255,0.05); color: var(--text-muted); cursor: pointer; transition: 0.2s; border: 1px solid var(--card-border); text-align: left; }
    .store-filter-btn:hover { background: rgba(255,255,255,0.1); }
    .store-filter-btn.active { background: rgba(0, 210, 255, 0.15); color: #fff; border-color: var(--primary); font-weight: bold; }

    .reorder-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 4px; font-size: 12px; }
    .reorder-btn:hover { color: #fff; }

    .roster-list-item {
      padding: 12px 16px; border-radius: 12px; background: rgba(255,255,255,0.03); border: 1px solid var(--card-border);
      cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: 0.2s;
    }
    .roster-list-item:hover { background: rgba(255,255,255,0.08); }
    .roster-list-item.active { background: rgba(0, 210, 255, 0.1); border-color: var(--primary); border-left: 4px solid var(--primary); }

    .roster-card { padding: 24px; border-radius: 16px; border: 1px solid var(--card-border); background: var(--card-bg); transition: 0.3s; width: max-content; max-width: 100%; }
    
    .roster-info-grid { display: grid; grid-template-columns: 80px 1fr; gap: 12px; align-items: center; margin-bottom: 20px; font-size: 14px; }
    .info-label { color: var(--text-muted); font-weight: 500; }
    
    .separator { height: 1px; background: var(--card-border); margin: 20px 0; }

    .day-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .day-label { font-size: 14px; width: 40px; color: var(--text-muted); }
    .time-inputs { display: flex; gap: 8px; align-items: center; }
    .time-input { 
      background: rgba(0,0,0,0.3); border: 1px solid var(--card-border); border-radius: 8px; 
      padding: 6px 10px; color: white; font-family: inherit; width: 90px; text-align: center;
      transition: border-color 0.2s; outline: none; font-size: 14px;
    }
    .time-input:focus { border-color: var(--primary); }

    .tab-pane { display: none; animation: fadeIn 0.4s ease forwards; }
    .tab-pane.active { display: block; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    details > summary { list-style: none; }
    details > summary::-webkit-details-marker { display: none; }

  </style>
</head>
<body>

  <!-- Auth Layer -->
  <div class="auth-layer" id="authLayer">
    <div class="loader-ring"></div>
    <h2 style="font-weight: 500; letter-spacing: 2px;">Authenticating...</h2>
    <p id="authMsg" style="margin-top: 10px; color: var(--text-muted);"></p>
  </div>

  <!-- App Layout -->
  <div class="app-container" id="appContainer">
    <aside class="sidebar">
      <div>
        <div class="brand">
          <div class="brand-icon">⌘</div>
          Antigravity
        </div>
        <p style="color: var(--text-muted); font-size: 12px; margin-top: 4px; margin-left: 48px;">Shift Management</p>
      </div>

      <div class="nav-links">
        <button class="nav-btn active" onclick="switchTab('tabShift', this)">
          📊 シフト確定
        </button>
        <button class="nav-btn" onclick="switchTab('tabRoster', this)">
          ⚙️ 名簿・固定シフト管理
        </button>
        <a href="https://db.mky-szk.com/" target="_blank" class="nav-btn" style="text-decoration: none;">
          🗄️ DB管理画面
        </a>
      </div>

      <div class="user-profile">
        <img src="https://via.placeholder.com/40" alt="avatar" class="user-avatar" id="navAvatar">
        <div>
          <div style="font-weight: 600;" id="navUserName">管理者</div>
          <div style="font-size: 11px; color: var(--text-muted);">Admin Access</div>
        </div>
      </div>
    </aside>

    <main class="main-content">
      
      <!-- Tab: Shift Confirm -->
      <section id="tabShift" class="tab-pane active">
        <div class="section-header">
          <div>
            <h1 class="section-title">シフト確定</h1>
            <p class="section-desc">提出されたシフト希望の店舗をアサインし、全員へ確定通知を送信します。</p>
          </div>
          <button class="btn btn-success" onclick="confirmAllShifts()">
            <span style="font-size:18px">🚀</span> 一括確定＆LINE通知
          </button>
        </div>

        <div class="control-bar" style="background: rgba(0,0,0,0.2); padding: 16px; border-radius: 12px; border: 1px solid var(--card-border); gap: 20px;">
          <div style="display:flex; align-items:center; gap: 12px; flex-wrap: wrap; width: 100%;">
            <div style="display:flex; align-items:center; gap:8px;">
              <select class="select-styled" id="monthSelect" onchange="calculateShortages(); renderShiftTable();">
                <option value="2026-04" selected>2026年 4月</option>
                <option value="2026-05">2026年 5月</option>
              </select>
              <select class="select-styled" id="filterStatus" onchange="renderShiftTable()">
                <option value="all">すべて表示</option>
                <option value="pending" selected>未確定（どちらでも可/希望中）</option>
                <option value="approved">確定済み</option>
              </select>
              <button class="btn btn-primary" onclick="loadShiftData()">🔄 データ更新</button>
            </div>
            
            <div style="width: 1px; height: 30px; background: var(--card-border); margin: 0 8px;"></div>
            
            <div style="display:flex; align-items:center; gap: 8px;">
              <span style="font-size:13px; color:var(--text-muted);">目安ベース:</span>
              <span style="font-size:13px;">瀬崎</span>
              <input type="number" id="reqSezaki" class="input-styled" style="width: 60px; padding: 6px;" value="2" min="0" onchange="calculateShortages()">
              <span style="font-size:13px; margin-left:8px;">櫛引</span>
              <input type="number" id="reqKushibiki" class="input-styled" style="width: 60px; padding: 6px;" value="2" min="0" onchange="calculateShortages()">
            </div>
          </div>
          
          <div style="width: 100%; border-top: 1px dashed var(--card-border); padding-top: 16px; display: flex; flex-direction: column; gap: 12px;">
            <div style="display: flex; justify-content: space-between; align-items: flex-end;">
              <label for="aiAuditRule" style="font-size:14px; color:var(--primary); font-weight:600;">📝 AI監査時の特記事項（※数値枠と競合する場合などはAIが良しなに判断します）</label>
              <button class="btn" style="background: linear-gradient(135deg, #8e2de2, #4a00e0); color: white; box-shadow: 0 4px 15px rgba(142, 45, 226, 0.3);" onclick="runAiAudit()">
                <span style="font-size:16px">✨</span> オート監査・自動割当を実行
              </button>
            </div>
            <textarea id="aiAuditRule" class="input-styled" style="height: 70px; resize: vertical; line-height: 1.5; font-family: monospace;" placeholder="例：瀬崎は13-15時はワンオペ可、など">瀬崎店は6:00-11:00の間は3名推奨。13:00-15:00はワンオペ可。</textarea>
          </div>
        </div>

        <!-- Notification & Summary Area -->
        <div id="summaryAreaContainer" style="margin-bottom: 24px;">
          <div id="shortageList" style="display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px;"></div>
          
          <!-- AI Audit Report Area -->
          <div id="aiSummaryArea" style="display:none;" class="ai-summary">
            <div class="ai-summary-title">🤖 AI監査の詳細レポート</div>
            <div id="aiReportContent" style="font-size:14.5px; line-height:1.7; white-space: pre-wrap; margin-top:12px; color: #f8f9fa;"></div>
          </div>
        </div>

        <div class="table-container">
          <table id="shiftTable">
            <thead>
              <tr>
                <th>対象日</th>
                <th>スタッフ</th>
                <th>希望時間</th>
                <th>希望内容</th>
                <th>ステータス</th>
                <th>店舗確定・操作</th>
              </tr>
            </thead>
            <tbody id="shiftTableBody">
              <!-- Rendered via JS -->
            </tbody>
          </table>
          <div id="shiftEmpty" style="display:none; padding: 40px; text-align: center; color: var(--text-muted);">
            指定条件のデータがありません
          </div>
        </div>
      </section>

      <!-- Tab: Roster / Fixed Shifts -->
      <section id="tabRoster" class="tab-pane">
        <div class="section-header">
          <div>
            <h1 class="section-title">名簿・固定シフト管理</h1>
            <p class="section-desc">スタッフ基本情報（異動/時給）と、固定シフト（日〜土）を設定・更新します。</p>
          </div>
          <button class="btn btn-primary" onclick="saveAllRosters()">
            💾 全ての変更を保存
          </button>
        </div>
        
        <div class="control-bar">
          <input type="text" id="searchRoster" class="input-styled" style="max-width: 260px;" placeholder="スタッフ名で検索..." oninput="renderRosterGrid()">
          <button class="btn btn-primary" onclick="loadRosterData()" style="background: rgba(255,255,255,0.1); box-shadow: none;">🔄 名簿再読込</button>
        </div>

        <div class="roster-layout" id="rosterLayout">
          <div class="roster-layout-filter" id="storeFilter"></div>
          <div class="roster-layout-left" id="rosterList"></div>
          <div class="roster-layout-right" id="rosterDetail"></div>
        </div>
      </section>

    </main>
  </div>

<script>
  // ==========================================
  // CONFIG & CONSTANTS
  // ==========================================
  const LIFF_ID = '2009694930-8BjZ3Nk8'; // Temporarily using existing LIFF ID
  const ADMIN_UIDS = []; // Empty array means ANY user can access (for testing logic).
  
  // Endpoints
  const WEBHOOK_BASE = 'https://n8n.mky-szk.com/webhook';
  const WEBHOOK_FETCH_ROSTER = `${WEBHOOK_BASE}/app-fetch-roster`;
  const WEBHOOK_FETCH_SHIFTS = `${WEBHOOK_BASE}/app-fetch-shifts`;
  const WEBHOOK_UPDATE_ROSTER = `${WEBHOOK_BASE}/app-update-roster`;
  const WEBHOOK_CONFIRM_SHIFTS = `${WEBHOOK_BASE}/app-confirm-shifts`;
  const WEBHOOK_RESET_USER = `${WEBHOOK_BASE}/app-reset-user`;
  const WEBHOOK_AI_AUDIT = `${WEBHOOK_BASE}/app-ai-audit`;

  // State
  let shiftData = [];
  let rosterData = [];
  let currentUser = null;
  let selectedRosterUid = null;
  let selectedStoreFilter = 'すべて';

  // ==========================================
  // INITIALIZATION & AUTHENTICATION
  // ==========================================
  document.addEventListener('DOMContentLoaded', async () => {
    const isDebug = new URLSearchParams(window.location.search).get('debug') === '1';
    
    if (isDebug) {
      document.getElementById('authMsg').textContent = 'Debug Mode Active';
      currentUser = { userId: 'DEBUG_USER', displayName: 'Developer (Debug)', pictureUrl: 'https://via.placeholder.com/40' };
      initializeApp();
      return;
    }

    try {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) {
        liff.login({ redirectUri: window.location.href });
        return;
      }
      currentUser = await liff.getProfile();
      
      if (ADMIN_UIDS.length > 0 && !ADMIN_UIDS.includes(currentUser.userId)) {
        document.getElementById('authLayer').innerHTML = `
          <div style="text-align:center; color: var(--danger);">
            <div style="font-size:48px; margin-bottom:16px;">🛑</div>
            <h2>Access Denied</h2>
            <p style="margin-top:8px; color:var(--text-muted);">この画面へアクセスする権限がありません。</p>
          </div>
        `;
        return;
      }

      initializeApp();
    } catch (err) {
      document.getElementById('authMsg').textContent = 'LIFF Initialization Failed: ' + err.message;
    }
  });

  function initializeApp() {
    if(currentUser.pictureUrl) {
      document.getElementById('navAvatar').src = currentUser.pictureUrl;
    }
    document.getElementById('navUserName').textContent = currentUser.displayName;

    document.getElementById('authLayer').style.display = 'none';
    document.getElementById('appContainer').style.display = 'flex';
    setTimeout(() => {
      document.getElementById('appContainer').style.opacity = '1';
      loadShiftData();
      loadRosterData();
    }, 50);
  }

  // ==========================================
  // UI LOGIC
  // ==========================================
  function switchTab(tabId, btnElem) {
    document.querySelectorAll('.tab-pane').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    btnElem.classList.add('active');
  }

  // ==========================================
  // TAB 1: SHIFT CONFIRM & AI AUDIT
  // ==========================================
  async function loadShiftData() {
    const tbody = document.getElementById('shiftTableBody');
    tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;">Loading data...</td></tr>`;

    try {
      const res = await fetch(WEBHOOK_FETCH_SHIFTS);
      if(!res.ok) throw new Error("HTTP Status: " + res.status);
      shiftData = await res.json();
      renderShiftTable();
      calculateShortages();
    } catch(err) {
      Swal.fire({ icon: 'error', title: '読み込みエラー', text: err.message, background: '#1e272e', color: '#fff' });
    }
  }

  function calculateShortages() {
    const filterMonth = document.getElementById('monthSelect').value;
    const reqS = parseInt(document.getElementById('reqSezaki').value) || 0;
    const reqK = parseInt(document.getElementById('reqKushibiki').value) || 0;
    
    const dailyCount = {};
    
    // 集計処理
    shiftData.forEach(d => {
      if(!d.date.startsWith(filterMonth)) return;
      if(!dailyCount[d.date]) dailyCount[d.date] = { '瀬崎': 0, '櫛引': 0 };
      
      const store = d.assignedStore || (d.storeReq !== 'どちらでも可' && !d.storeReq.includes('、') && !d.storeReq.includes('・') ? d.storeReq : null);
      if(store === '瀬崎') dailyCount[d.date]['瀬崎']++;
      if(store === '櫛引') dailyCount[d.date]['櫛引']++;
    });

    const shortageList = document.getElementById('shortageList');
    shortageList.innerHTML = '';
    let hasShortage = false;

    Object.keys(dailyCount).sort().forEach(date => {
      const c = dailyCount[date];
      const shortS = reqS - c['瀬崎'];
      const shortK = reqK - c['櫛引'];
      
      if(shortS > 0 || shortK > 0) {
        hasShortage = true;
        let txt = `<strong style="width:100px; display:inline-block;">📅 ${date}</strong>`;
        if(shortS > 0) txt += `<span style="color:var(--warning); font-weight:600; margin-right:12px;">瀬崎が ${shortS}名 不足 (現在${c['瀬崎']})</span>`;
        if(shortK > 0) txt += `<span style="color:var(--warning); font-weight:600;">櫛引が ${shortK}名 不足 (現在${c['櫛引']})</span>`;
        
        const div = document.createElement('div');
        div.className = 'shortage-item';
        div.innerHTML = txt;
        shortageList.appendChild(div);
      }
    });

    if(!hasShortage) {
      shortageList.innerHTML = `<div class="shortage-ok">✅ ベース人数（${reqS}名/${reqK}名）の不足はありません。（※細かい時間帯の状況はAI監査ルールと合わせて確認してください）</div>`;
    }
  }

  async function runAiAudit() {
    const filterMonth = document.getElementById('monthSelect').value;
    const ruleText = document.getElementById('aiAuditRule').value;
    const reqS = document.getElementById('reqSezaki').value;
    const reqK = document.getElementById('reqKushibiki').value;

    const payload = {
      targetMonth: filterMonth,
      requiredBaseSezaki: reqS,
      requiredBaseKushibiki: reqK,
      auditRule: ruleText,
      shifts: shiftData,
      roster: rosterData
    };

    Swal.fire({
      title: 'AI監査・割当実行中...',
      html: 'ベース目安人数と特記事項ルールのハイブリッドで、Geminiが人員配置を分析しています。<br>約10〜20秒かかります...',
      allowOutsideClick: false,
      didOpen: () => { Swal.showLoading(); },
      background: '#1e272e', color: '#fff'
    });

    try {
      const res = await fetch(WEBHOOK_AI_AUDIT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      if(!res.ok) throw new Error("API連携エラー: " + res.status);
      
      const result = await res.json();
      
      if(result.assignments && Array.isArray(result.assignments)) {
        result.assignments.forEach(a => {
          const row = shiftData.find(x => x.id === a.id);
          if(row && row.status === '希望中') {
            row.assignedStore = a.assignedStore; // 画面上のみ更新
          }
        });
      }

      const aiReportEl = document.getElementById('aiReportContent');
      if(result.reportText) {
        aiReportEl.innerHTML = result.reportText.replace(/\\n/g, '<br>');
        document.getElementById('aiSummaryArea').style.display = 'block';
      }

      renderShiftTable();
      calculateShortages();
      Swal.fire({ icon: 'success', title: 'AI処理完了', text: '詳細な監査レポートを出力し、推奨シフト配列を画面に反映しました。', background: '#1e272e', color: '#fff' });

    } catch(err) {
      Swal.fire({ icon: 'error', title: 'AI監査エラー', text: err.message, background: '#1e272e', color: '#fff' });
    }
  }

  function renderShiftTable() {
    const filter = document.getElementById('filterStatus').value;
    const month = document.getElementById('monthSelect').value;
    const tbody = document.getElementById('shiftTableBody');
    const emptyMsg = document.getElementById('shiftEmpty');
    
    tbody.innerHTML = '';
    
    const filtered = shiftData.filter(d => {
      if(!d.date.startsWith(month)) return false;
      if(filter === 'pending') return d.status === '希望中';
      if(filter === 'approved') return d.status === '有効';
      return true;
    });

    if (filtered.length === 0) {
      emptyMsg.style.display = 'block';
      return;
    }
    emptyMsg.style.display = 'none';

    filtered.forEach(d => {
      const isPending = d.status === '希望中';
      const badgeCls = isPending ? 'badge-pending' : 'badge-approved';
      
      const selectHtml = `
        <select class="select-styled" onchange="updateRowStore('${d.id}', this.value)" style="width: 120px;" ${!isPending ? 'disabled' : ''}>
          <option value="" ${d.assignedStore==='' ? 'selected' : ''}>-- 未確定 --</option>
          <option value="瀬崎" ${d.assignedStore==='瀬崎' ? 'selected' : ''}>瀬崎</option>
          <option value="櫛引" ${d.assignedStore==='櫛引' ? 'selected' : ''}>櫛引</option>
        </select>
      `;

      const actionHtml = isPending 
        ? `<button class="btn" style="background:rgba(255,255,255,0.1); padding: 8px 12px; margin-left: 8px; font-size:13px;" onclick="saveSingleShift('${d.id}')">保存</button>`
        : `<span style="color:var(--success); margin-left: 8px; font-size:12px; font-weight:600;">確定済</span>`;

      const storeColor = (d.storeReq === 'どちらでも可' || d.storeReq.includes('、')) ? 'color: var(--warning); font-weight:600;' : '';

      const tr = document.createElement('tr');
      // Highlight row if recently assigned by AI (simple visual cue)
      if(d.assignedStore && isPending) tr.style.background = 'rgba(46, 213, 115, 0.05)';

      tr.innerHTML = `
        <td style="font-family: monospace;">${d.date}</td>
        <td style="font-weight:600;">${d.name}</td>
        <td>${d.time}</td>
        <td><span style="${storeColor}">${d.storeReq}</span></td>
        <td><span class="badge ${badgeCls}">${d.status}</span></td>
        <td>${selectHtml} ${actionHtml}</td>
      `;
      tbody.appendChild(tr);
    });
  }

  function updateRowStore(id, val) {
    const row = shiftData.find(x => x.id === id);
    if(row) row.assignedStore = val;
    calculateShortages();
  }

  async function saveSingleShift(id) {
    const row = shiftData.find(x => x.id === id);
    if(!row.assignedStore) {
      Swal.fire({ icon: 'warning', title: '店舗未確定', text: '「どちらでも可」等の場合、店舗を確定(選択)してから保存してください。', background: '#1e272e', color: '#fff'});
      return;
    }
    
    // Simulate Fetch save
    row.status = '有効';
    renderShiftTable();
    calculateShortages();
    Swal.fire({ icon: 'success', title: '保存しました', toast: true, position: 'top-end', showConfirmButton: false, timer: 2000, background: '#1e272e', color: '#fff'});
  }

  async function confirmAllShifts() {
    const unassigned = shiftData.find(d => d.status === '希望中' && !d.assignedStore);
    if(unassigned) {
      Swal.fire({ icon: 'warning', title: '未割当あり', text: '店舗が割り当てられていない希望が存在します。すべてを確定してから送信してください。', background: '#1e272e', color: '#fff' });
      return;
    }

    const { isConfirmed } = await Swal.fire({
      title: '確定＆通知送信',
      text: '現在表示されている希望を全て確定し、スタッフへ確定通知をLINEでプッシュしますか？',
      icon: 'question',
      showCancelButton: true,
      confirmButtonText: '送信する',
      confirmButtonColor: '#2ed573',
      background: '#1e272e', color: '#fff'
    });

    if(isConfirmed) {
      Swal.fire({
        title: '送信中...', allowOutsideClick: false, showConfirmButton: false, 
        didOpen: () => { Swal.showLoading(); }, background: '#1e272e', color: '#fff' 
      });

      // Simulate Fetch save
      const confirmed = shiftData.filter(d => d.status === '希望中');
      try {
        await fetch(WEBHOOK_CONFIRM_SHIFTS, {
           method: 'POST',
           headers: {'Content-Type': 'application/json'},
           body: JSON.stringify(confirmed)
        });
        shiftData.forEach(d => { if(d.status === '希望中') d.status = '有効'; });
        renderShiftTable();
        calculateShortages();
        Swal.fire({ title: '送信完了', text: '全員への確定通知がスケジュールされました。', icon: 'success', background: '#1e272e', color: '#fff' });
      } catch (err) {
        Swal.fire({ title: '通知エラー', text: err.message, icon: 'error', background: '#1e272e', color: '#fff' });
      }
    }
  }

  function selectRoster(uid) {
    selectedRosterUid = uid;
    renderRosterGrid();
  }

  function moveStaff(uid, direction) {
    const searchVal = document.getElementById('searchRoster').value.toLowerCase();
    const filteredOpts = rosterData.filter(u => {
      const matchSearch = u.name.toLowerCase().includes(searchVal);
      const matchStore = (selectedStoreFilter === 'すべて') || (u.store||'').includes(selectedStoreFilter);
      return matchSearch && matchStore;
    });

    const currentVisIdx = filteredOpts.findIndex(u => u.uid === uid);
    if(currentVisIdx < 0) return;
    
    const targetVisIdx = currentVisIdx + direction;
    if(targetVisIdx < 0 || targetVisIdx >= filteredOpts.length) return;

    const currentUserObj = filteredOpts[currentVisIdx];
    const targetUserObj = filteredOpts[targetVisIdx];

    const currentGlobIdx = rosterData.findIndex(u => u.uid === currentUserObj.uid);
    const targetGlobIdx = rosterData.findIndex(u => u.uid === targetUserObj.uid);

    if(currentGlobIdx !== -1 && targetGlobIdx !== -1) {
      rosterData.splice(currentGlobIdx, 1);
      const newTargetGlobIdx = rosterData.findIndex(u => u.uid === targetUserObj.uid);
      
      if(direction === -1) {
         rosterData.splice(newTargetGlobIdx, 0, currentUserObj);
      } else {
         rosterData.splice(newTargetGlobIdx + 1, 0, currentUserObj);
      }
      
      rosterData.forEach((u, index) => { u.sort_order = index; });
      renderRosterGrid();
    }
  }

  function moveStaffTo(fromUid, toUid, placeAfter) {
    if(fromUid === toUid) return;
    
    // We directly manipulate global rosterData (simpler mapping)
    // We get indices to ensure target hasn't completely shifted
    const currentGlobIdx = rosterData.findIndex(u => u.uid === fromUid);
    if(currentGlobIdx === -1) return;
    const currentUserObj = rosterData[currentGlobIdx];
    
    rosterData.splice(currentGlobIdx, 1);

    const targetGlobIdx = rosterData.findIndex(u => u.uid === toUid);
    if(targetGlobIdx !== -1) {
      if(placeAfter) {
         rosterData.splice(targetGlobIdx + 1, 0, currentUserObj);
      } else {
         rosterData.splice(targetGlobIdx, 0, currentUserObj);
      }
    } else {
      // fallback
      rosterData.push(currentUserObj);
    }
    
    rosterData.forEach((u, index) => { u.sort_order = index; });
    renderRosterGrid();
  }

  // ==========================================
  // TAB 2: ROSTER & FIXED SHIFTS
  // ==========================================
  const DAYS = ['日', '月', '火', '水', '木', '金', '土'];

  async function loadRosterData() {
    if (rosterData.length > 0) {
      if (!confirm('変更が保存されていない場合、リセットされます。名簿を再読込しますか？')) return;
    }
    const listContainer = document.getElementById('rosterList');
    const detailContainer = document.getElementById('rosterDetail');
    if(listContainer) listContainer.innerHTML = `<div style="padding: 20px;">読込中...（初回は数秒かかります）</div>`;
    if(detailContainer) detailContainer.innerHTML = '';

    try {
      const res = await fetch(WEBHOOK_FETCH_ROSTER);
      if(!res.ok) throw new Error("HTTP Status: " + res.status);
      rosterData = await res.json();
      renderRosterGrid();
    } catch(err) {
      Swal.fire({ icon: 'error', title: '名簿読込エラー', text: err.message, background: '#1e272e', color: '#fff' });
    }
  }

  function updateRosterDataState(uid, key, val) {
    const user = rosterData.find(x => x.uid === uid);
    if(user) user[key] = val;
  }

  function buildStoreSelector(uid, day, slotIdx, storeVal) {
    const user = rosterData.find(x => x.uid === uid);
    const stores = (user.store || '').split('・').filter(s => s && s !== '未設定');
    if (stores.length <= 1) {
      const label = stores[0] || '未設定';
      return `<span style="font-size:12px; color:var(--text-muted); padding:0 6px;">[${label}]</span>`;
    }
    const options = `<option value="">(店舗を選択)</option>` +
      stores.map(s => `<option value="${s}" ${storeVal === s ? 'selected' : ''}>${s}</option>`).join('');
    return `<select class="select-styled" style="width:110px; padding:4px 8px; font-size:13px;" onchange="updateSlotStore('${uid}', '${day}', ${slotIdx}, this.value)">${options}</select>`;
  }

  function updateSlotStore(uid, day, slotIdx, storeName) {
    const user = rosterData.find(x => x.uid === uid);
    if(user) {
      if(!Array.isArray(user.fixed[day]) || (user.fixed[day].length===2 && typeof user.fixed[day][0]==='string')) {
        user.fixed[day] = [ [user.fixed[day][0]||'', user.fixed[day][1]||'', ''] ];
      }
      if(!user.fixed[day][slotIdx]) user.fixed[day][slotIdx] = ['', '', ''];
      user.fixed[day][slotIdx][2] = storeName;
    }
  }

  function renderRosterGrid() {
    const listContainer = document.getElementById('rosterList');
    const detailContainer = document.getElementById('rosterDetail');
    if(!listContainer || !detailContainer) return;
    
    const filterContainer = document.getElementById('storeFilter');
    if (filterContainer) {
      const allStores = Array.from(new Set(rosterData.flatMap(u => (u.store||'').split('・')))).filter(s => s && s !== '未設定');
      const filterOptions = ['すべて', ...allStores];
      filterContainer.innerHTML = '';
      filterOptions.forEach(store => {
        const btn = document.createElement('button');
        btn.className = 'store-filter-btn ' + (selectedStoreFilter === store ? 'active' : '');
        btn.textContent = store;
        btn.onclick = () => { selectedStoreFilter = store; renderRosterGrid(); };
        filterContainer.appendChild(btn);
      });
    }

    const searchVal = document.getElementById('searchRoster').value.toLowerCase();
    listContainer.innerHTML = '';
    detailContainer.innerHTML = '';

    rosterData.sort((a,b) => (a.sort_order||0) - (b.sort_order||0));

    const filtered = rosterData.filter(u => {
      const matchSearch = u.name.toLowerCase().includes(searchVal);
      const matchStore = (selectedStoreFilter === 'すべて') || (u.store||'').includes(selectedStoreFilter);
      return matchSearch && matchStore;
    });

    if(filtered.length === 0) {
      listContainer.innerHTML = `<div style="padding:20px; color:var(--text-muted);">一致するスタッフがいません</div>`;
      return;
    }

    if(!selectedRosterUid || !filtered.find(u => u.uid === selectedRosterUid)) {
      selectedRosterUid = filtered[0].uid;
    }

    filtered.forEach((user, idx) => {
      const item = document.createElement('div');
      item.className = 'roster-list-item ' + (user.uid === selectedRosterUid ? 'active' : '');
      item.draggable = true;
      item.ondragstart = (e) => {
        e.dataTransfer.setData('text/plain', user.uid);
        item.style.opacity = '0.5';
      };
      item.ondragend = (e) => {
        item.style.opacity = '1';
        document.querySelectorAll('.roster-list-item').forEach(el => el.style.borderTop = '');
        document.querySelectorAll('.roster-list-item').forEach(el => el.style.borderBottom = '');
      };
      item.ondragover = (e) => {
        e.preventDefault(); // allow drop
        const rect = item.getBoundingClientRect();
        const y = e.clientY - rect.top;
        if (y < rect.height / 2) {
           item.style.borderTop = '2px solid var(--primary)';
           item.style.borderBottom = '';
        } else {
           item.style.borderBottom = '2px solid var(--primary)';
           item.style.borderTop = '';
        }
      };
      item.ondragleave = (e) => {
        item.style.borderTop = '';
        item.style.borderBottom = '';
      };
      item.ondrop = (e) => {
        e.preventDefault();
        item.style.borderTop = '';
        item.style.borderBottom = '';
        const fromUid = e.dataTransfer.getData('text/plain');
        if(!fromUid || fromUid === user.uid) return;
        
        const rect = item.getBoundingClientRect();
        const y = e.clientY - rect.top;
        const placeAfter = y >= rect.height / 2;
        
        moveStaffTo(fromUid, user.uid, placeAfter);
      };
      
      const isFirst = idx === 0;
      const isLast = idx === filtered.length - 1;

      item.innerHTML = `
        <div style="display:flex; flex-direction:column; flex: 1; cursor:pointer;" onclick="selectRoster('${user.uid}')">
          <div style="display:flex; align-items:center; gap:8px;">
            <span style="color:${user.active ? 'var(--success)' : 'var(--text-muted)'}; font-size:10px;">●</span>
            <span style="font-weight:600; font-size:14px;">${user.name}</span>
          </div>
          <div style="font-size:11px; color:var(--text-muted); margin-top:2px; margin-left:18px;">
            ${user.store ? user.store.replace(/・/g, ', ') : '店舗未定'}
          </div>
        </div>
        <div style="display:flex; flex-direction:column; align-items:center;">
          <button class="reorder-btn" onclick="moveStaff('${user.uid}', -1)" ${isFirst ? 'style="visibility:hidden;"' : ''} title="上へ移動">▲</button>
          <button class="reorder-btn" onclick="moveStaff('${user.uid}', 1)" ${isLast ? 'style="visibility:hidden;"' : ''} title="下へ移動">▼</button>
        </div>
      `;
      listContainer.appendChild(item);
    });

    const user = filtered.find(u => u.uid === selectedRosterUid);
    if(user) {
      const isActiveChecked = user.active === 1 ? 'checked' : '';
      const basicInfoHtml = `
        <div class="roster-info-grid">
          <div class="info-label">氏名</div>
          <input type="text" class="input-styled" style="padding:6px 12px;" value="${user.name}" onchange="updateRosterDataState('${user.uid}', 'name', this.value)">
          
          <div class="info-label">時給(円)</div>
          <input type="number" class="input-styled" style="padding:6px 12px;" value="${user.wage}" onchange="updateRosterDataState('${user.uid}', 'wage', parseInt(this.value))">
          
          <div class="info-label">店舗</div>
          <div style="display:flex; gap:12px; align-items:center;">
             <label style="cursor:pointer; font-size:14px;"><input type="checkbox" onchange="toggleStore('${user.uid}', '瀬崎', this.checked)" ${(user.store||'').includes('瀬崎')?'checked':''}> 瀬崎</label>
             <label style="cursor:pointer; font-size:14px;"><input type="checkbox" onchange="toggleStore('${user.uid}', '櫛引', this.checked)" ${(user.store||'').includes('櫛引')?'checked':''}> 櫛引</label>
          </div>
          
          <div class="info-label" style="height:24px;">在籍状況</div>
          <label class="switch">
            <input type="checkbox" ${isActiveChecked} onchange="updateRosterDataState('${user.uid}', 'active', this.checked ? 1 : 0)">
            <span class="slider"></span>
          </label>
        </div>
      `;

      let shiftsHtml = '';
      DAYS.forEach(day => {
        const slots = user.fixed[day] || [];
        let slotHtml = '';
        if(slots.length === 0 || (slots.length === 2 && typeof slots[0] === 'string')) {
           const start = typeof slots[0] === 'string' ? slots[0] : '';
           const end = typeof slots[1] === 'string' ? slots[1] : '';
           slotHtml = `<div class="time-inputs" data-day="${day}" data-idx="0">
             <input type="time" class="time-input" value="${start}" onchange="updateRosterTime('${user.uid}', '${day}', 0, 0, this.value)">
             <span style="color:var(--text-muted)">-</span>
             <input type="time" class="time-input" value="${end}" onchange="updateRosterTime('${user.uid}', '${day}', 0, 1, this.value)">
             ${buildStoreSelector(user.uid, day, 0, '')}
             <button class="btn" style="padding:4px 8px; font-size:12px; background:rgba(255,255,255,0.1);" onclick="addSlot('${user.uid}', '${day}')">+</button>
           </div>`;
        } else {
             slots.forEach((s, i) => {
             slotHtml += `<div class="time-inputs" data-day="${day}" data-idx="${i}">
               <input type="time" class="time-input" value="${s[0]||''}" onchange="updateRosterTime('${user.uid}', '${day}', ${i}, 0, this.value)">
               <span style="color:var(--text-muted)">-</span>
               <input type="time" class="time-input" value="${s[1]||''}" onchange="updateRosterTime('${user.uid}', '${day}', ${i}, 1, this.value)">
               ${buildStoreSelector(user.uid, day, i, s[2]||'')}
               ${i === slots.length - 1 
                 ? `<button class="btn" style="padding:4px 8px; font-size:12px; background:rgba(255,255,255,0.1);" onclick="addSlot('${user.uid}', '${day}')">+</button>`
                 : `<button class="btn" style="padding:4px 10px; font-size:12px; background:rgba(255,71,87,0.2); color:var(--danger);" onclick="removeSlot('${user.uid}', '${day}', ${i})">&times;</button>`
               }
             </div>`;
           });
        }

        shiftsHtml += `
          <div class="day-row" style="align-items:flex-start;">
            <span class="day-label" style="padding-top:6px;">${day}</span>
            <div style="display:flex; flex-direction:column; gap:6px;">
              ${slotHtml}
            </div>
          </div>
        `;
      });

      const card = document.createElement('div');
      card.className = 'roster-card';
      card.style.margin = '0';
      card.innerHTML = `
        <h2 style="font-size:18px; margin-bottom:20px; color:var(--primary); font-weight:600;">${user.name} さんの設定</h2>
        ${basicInfoHtml}
        <div class="separator"></div>
        <div class="info-label" style="margin-bottom:12px;">固定シフト</div>
        <div>${shiftsHtml}</div>
        <div class="separator"></div>
        <div style="text-align:right; margin-top:12px;">
          <button class="btn" style="background:var(--danger); color:#fff; font-size:12px; padding:6px 12px; box-shadow:none;" onclick="resetUserData('${user.uid}', '${user.name}')">⚠️ このスタッフのデータをリセット</button>
        </div>
      `;
      detailContainer.appendChild(card);
    }
  }

  function toggleStore(uid, storeName, isChecked) {
    const user = rosterData.find(x => x.uid === uid);
    if(!user) return;
    let s = user.store || '';
    if (isChecked) {
      if(!s.includes(storeName)) s = s ? s + '・' + storeName : storeName;
    } else {
      s = s.replace(new RegExp(storeName + '・?|・?' + storeName), '');
      // クリーンアップ
      Object.keys(user.fixed).forEach(day => {
        (user.fixed[day] || []).forEach(slot => {
          if (Array.isArray(slot) && slot[2] === storeName) slot[2] = '';
        });
      });
    }
    user.store = s || '未設定';
    renderRosterGrid();
  }

  function addSlot(uid, day) {
    const user = rosterData.find(x => x.uid === uid);
    if(!user) return;
    if(!Array.isArray(user.fixed[day]) || (user.fixed[day].length===2 && typeof user.fixed[day][0]==='string')) {
       // normalize it to 2D
       user.fixed[day] = [ [user.fixed[day][0]||'', user.fixed[day][1]||'', ''] ];
    }
    user.fixed[day].push(['', '', '']);
    renderRosterGrid();
  }
  
  function removeSlot(uid, day, idx) {
    const user = rosterData.find(x => x.uid === uid);
    if(!user) return;
    if(Array.isArray(user.fixed[day]) && user.fixed[day].length > 1) {
      user.fixed[day].splice(idx, 1);
      renderRosterGrid();
    }
  }

  function updateRosterTime(uid, day, slotIdx, timeIdx, val) {
    const user = rosterData.find(x => x.uid === uid);
    if(user) {
      if(!Array.isArray(user.fixed[day]) || (user.fixed[day].length===2 && typeof user.fixed[day][0]==='string')) {
         user.fixed[day] = [ [user.fixed[day][0]||'', user.fixed[day][1]||'', ''] ];
      }
      if(!user.fixed[day][slotIdx]) user.fixed[day][slotIdx] = ['', '', ''];
      user.fixed[day][slotIdx][timeIdx] = val;
    }
  }

  async function saveAllRosters() {
    // Validation
    try {
      rosterData.forEach((u, index) => { u.sort_order = index; });
      for (const user of rosterData) {
        const stores = (user.store || '').split('・').filter(s => s && s !== '未設定');
        for (const day of DAYS) {
          const slots = user.fixed[day] || [];
          for (let i=0; i<slots.length; i++) {
            const slot = slots[i];
            if (Array.isArray(slot) && (slot[0] || slot[1])) {
              if (stores.length === 1) {
                user.fixed[day][i][2] = stores[0]; // Auto-assign singleton
              } else if (stores.length > 1 && !slot[2]) {
                throw new Error(`${user.name} さんの ${day}曜日の固定シフトに「店舗」が設定されていません。`);
              }
            }
          }
        }
      }
    } catch(err) {
      Swal.fire({ icon: 'warning', title: '保存前エラー', text: err.message, background: '#1e272e', color: '#fff' });
      return;
    }

    Swal.fire({ title: '保存中...', allowOutsideClick: false, showConfirmButton: false, didOpen:()=>{Swal.showLoading();}, background: '#1e272e', color: '#fff' });
    
    try {
      await fetch(WEBHOOK_UPDATE_ROSTER, {
         method: 'POST',
         headers: {'Content-Type': 'application/json'},
         body: JSON.stringify(rosterData)
      });
      Swal.fire({ icon: 'success', title: '保存完了', text: 'スプレッドシート上の名簿・固定シフト設定を一括更新しました。', background: '#1e272e', color: '#fff' });
    } catch(err) {
      Swal.fire({ icon: 'error', title: '保存失敗', text: err.message, background: '#1e272e', color: '#fff' });
    }
  }

  async function resetUserData(uid, userName) {
    const { isConfirmed } = await Swal.fire({
      title: '🚨 危険な操作',
      html: `<b>${userName}</b> さんの過去のシフト希望とマスタデータを全てリセットしますか？<br><br><span style="color:var(--danger)">※この操作は取り消せません。幻覚データのクリアなどの非常時にのみ使用してください。</span>`,
      icon: 'warning',
      showCancelButton: true,
      confirmButtonText: 'はい、リセットします',
      confirmButtonColor: '#e84118',
      background: '#1e272e', color: '#fff'
    });

    if (isConfirmed) {
      Swal.fire({
        title: 'リセット中...', allowOutsideClick: false, showConfirmButton: false,
        didOpen: () => { Swal.showLoading(); }, background: '#1e272e', color: '#fff'
      });
      try {
        const res = await fetch(WEBHOOK_RESET_USER, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ target_uid: uid })
        });
        if(!res.ok) throw new Error("HTTP Status: " + res.status);
        Swal.fire({ title: 'リセット完了', text: 'データがリセットされました。', icon: 'success', background: '#1e272e', color: '#fff' });
      } catch(err) {
        Swal.fire({ icon: 'error', title: 'エラー', text: err.message, background: '#1e272e', color: '#fff' });
      }
    }
  }

</script>
</body>
</html>
