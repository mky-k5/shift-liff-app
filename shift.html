<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shift Request | シフト希望提出</title>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Hiragino Sans', 'Noto Sans JP', 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 24px;
      padding: 36px 28px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .logo { text-align: center; margin-bottom: 24px; }
    .logo-icon {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, #8e44ad, #3498db);
      border-radius: 18px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 32px; margin-bottom: 12px;
      box-shadow: 0 8px 24px rgba(142,68,173,0.35);
    }
    h1 { color: #fff; font-size: 20px; font-weight: 700; text-align: center; }
    .subtitle { color: rgba(255,255,255,0.5); font-size: 13px; text-align: center; margin-top: 4px; }
    .store-badge {
      display: inline-block;
      background: linear-gradient(135deg, #8e44ad, #3498db);
      color: #fff; font-size: 13px; font-weight: 600;
      padding: 4px 14px; border-radius: 20px; margin-top: 10px;
    }
    .hint-box {
      background: rgba(142,68,173,0.12);
      border: 1px solid rgba(142,68,173,0.3);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 18px;
    }
    .hint-box p { color: rgba(255,255,255,0.6); font-size: 12px; line-height: 1.7; }
    .hint-box .hint-title { color: rgba(255,255,255,0.85); font-size: 13px; font-weight: 600; margin-bottom: 6px; }
    label {
      display: block;
      color: rgba(255,255,255,0.7);
      font-size: 13px; font-weight: 600;
      margin-bottom: 8px; letter-spacing: 0.5px;
    }
    textarea {
      width: 100%; padding: 14px 16px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px; color: #fff; font-size: 15px; font-family: inherit;
      transition: all 0.2s; outline: none;
      resize: vertical; min-height: 140px; line-height: 1.6;
    }
    textarea::placeholder { color: rgba(255,255,255,0.3); }
    textarea:focus { border-color: #8e44ad; background: rgba(142,68,173,0.1); box-shadow: 0 0 0 3px rgba(142,68,173,0.2); }
    .char-count { text-align: right; color: rgba(255,255,255,0.35); font-size: 11px; margin-top: 6px; }
    .submit-btn {
      width: 100%; padding: 16px;
      background: linear-gradient(135deg, #8e44ad, #3498db);
      border: none; border-radius: 14px; color: #fff;
      font-size: 17px; font-weight: 700; cursor: pointer; margin-top: 16px;
      transition: all 0.2s; letter-spacing: 0.5px;
      box-shadow: 0 6px 20px rgba(142,68,173,0.35);
    }
    .submit-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .submit-btn:active { transform: translateY(0); }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .status {
      text-align: center; margin-top: 20px; padding: 16px;
      border-radius: 12px; font-size: 14px; font-weight: 600; display: none;
    }
    .status.success { background: rgba(46,213,115,0.15); color: #2ed573; border: 1px solid rgba(46,213,115,0.3); }
    .status.error { background: rgba(255,80,80,0.15); color: #ff5050; border: 1px solid rgba(255,80,80,0.3); }
    .loading { text-align:center; color:rgba(255,255,255,0.5); font-size:14px; padding: 20px 0; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">📅</div>
    <h1>シフト希望提出</h1>
    <p class="subtitle">Shift Request</p>
    <div class="store-badge" id="storeBadge">読み込み中...</div>
  </div>

  <div id="loadingMsg" class="loading">…認証中 / Authenticating</div>

  <div id="mainForm" style="display:none">
    <div class="hint-box">
      <div class="hint-title">💡 自由に記入してください / Write freely</div>
      <p>「来週は火木土に出勤できます」
「4/20は所用で休みたい」
「every Monday 9am-5pm OK」
— 何語・どんな形式でもOK！<br><br>
<strong style="color: #fff;">⚠️ 変更がなければ提出不要です</strong><br>
固定シフトの方・先週と同じ希望の方は何も送らなくてOKです。変更や例外がある場合のみ送信してください。</p>
    </div>

    <label>希望テキスト / Shift Request</label>
    <textarea id="shiftText"
      placeholder="例: 来週月木土は16時からOKです。日曜日は終日入れます。水曜は学校があるのでNGです。" required maxlength="500"></textarea>
    <div class="char-count"><span id="charCount">0</span> / 500</div>

    <button class="submit-btn" id="submitBtn" onclick="submitForm()">📤 送信する / Submit</button>
  </div>

  <div id="statusMsg" class="status"></div>
</div>

<script>
  const WEBHOOK_URL = 'https://n8n.mky-szk.com/webhook/shift-request';
  const LIFF_ID = '2009694930-8BjZ3Nk8';

  const storeMap = {
    sezaki: 'ファミリーマート草加瀬崎二丁目店',
    kushibiki: 'ファミリーマートさいたま櫛引町二丁目店'
  };

  const params = new URLSearchParams(window.location.search);
  const store = params.get('store') || 'sezaki';
  const storeName = storeMap[store] || store;
  document.getElementById('storeBadge').textContent = storeName;

  document.getElementById('shiftText').addEventListener('input', function() {
    document.getElementById('charCount').textContent = this.value.length;
  });

  let lineProfile = null;

  liff.init({ liffId: LIFF_ID })
    .then(async () => {
      if (!liff.isLoggedIn()) { liff.login({ redirectUri: window.location.href }); return; }
      lineProfile = await liff.getProfile();
      document.getElementById('loadingMsg').style.display = 'none';
      document.getElementById('mainForm').style.display = 'block';
    })
    .catch(err => {
      document.getElementById('loadingMsg').textContent = '認証エラー / Auth error: ' + err.message;
    });

  async function submitForm() {
    const text = document.getElementById('shiftText').value.trim();
    if (!text) {
      Swal.fire({
        icon: 'warning',
        title: '入力エラー',
        text: '希望テキストを入力してください / Please enter your shift request.',
        confirmButtonColor: '#8e44ad'
      });
      return; 
    }

    const { isConfirmed } = await Swal.fire({
      title: '送信確認',
      html: `以下の内容でシフト希望を送信します。よろしいですか？<br><br><div style="background:rgba(255,255,255,0.1); padding:12px; border-radius:8px; text-align:left; font-size:15px; border-left: 4px solid #8e44ad; color: #fff;">${text.replace(/\n/g, '<br>')}</div>`,
      icon: 'question',
      showCancelButton: true,
      background: '#1e272e',
      color: '#fff',
      confirmButtonColor: '#3498db',
      cancelButtonColor: '#576574',
      confirmButtonText: 'はい、送信します',
      cancelButtonText: 'キャンセル'
    });

    if (!isConfirmed) return;

    const btn = document.getElementById('submitBtn');
    const status = document.getElementById('statusMsg');
    btn.disabled = true;
    btn.textContent = '送信中... / Sending';

    const payload = {
      uid: lineProfile.userId,
      display_name: lineProfile.displayName,
      store: store,
      store_name: storeName,
      shift_text: text,
      submitted_at: new Date().toISOString()
    };

    try {
      const res = await fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      status.className = 'status success';
      status.textContent = '✅ 提出しました！ / Submitted!';
      status.style.display = 'block';
      document.getElementById('mainForm').style.display = 'none';
      setTimeout(() => liff.closeWindow(), 2500);
    } catch(err) {
      status.className = 'status error';
      status.textContent = '⚠️ 送信エラー / Send error. Please try again.';
      status.style.display = 'block';
      btn.disabled = false;
      btn.textContent = '📤 送信する / Submit';
    }
  }
</script>
</body>
</html>
